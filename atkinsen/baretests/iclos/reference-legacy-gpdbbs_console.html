function wsc(s,n){
    var out = "";
    for(var i=0;i<n;i++){

    }

}

function rsetdef(v){

        }
    }
    return v;
}

function breakcmd(s){
    var out = [];
    var i;
    var t = "";
    for(i=0;s.charAt(i)!==":"&&i<s.length;i++){
        t+=s.charAt(i);
    }
    i++;
    out.push(t);
    t="";
    var esc = false;
    var qch = "";
    var inq = false;
    var hws = true;
    for(;i<s.length;i++){
        var chr = s.charAt(i);
        if(esc){
            esc=false;
            t+=chr;
        }else if(chr === "\\"){
            t+="\\";
            esc=true;
            hws=false;
        }else if(inq){
            if(chr === qch){
                inq = false;
            }
            t += chr;
        }else if(chr === "\"" || chr === "'"){
            qch = chr;
            inq = true;
            t += chr;
            hws=false;
        }else if(chr === " "){
            if(!hws){
                out.push(t);
                t="";
                hws=true;
            }
        }else{
            if(hws){
                hws=false;
            }
            t+=chr;
        }
    }
    if(t.length!==0){
        out.push(t);
    }
    return out;
}

function breakcmd_notag(s){
    var out = [];
    var i;
    var t = "";

    var esc = false;
    var qch = "";
    var inq = false;
    var hws = true;
    for(i=0;i<s.length;i++){
        var chr = s.charAt(i);
        if(esc){
            esc=false;
            t+=chr;
        }else if(chr === "\\"){
            t+="\\";
            esc=true;
            hws=false;
        }else if(inq){
            if(chr === qch){
                inq = false;
            }
            t += chr;
        }else if(chr === "\"" || chr === "'"){
            qch = chr;
            inq = true;
            t += chr;
            hws=false;
        }else if(chr === " "){
            if(!hws){
                out.push(t);
                t="";
                hws=true;
            }
        }else{
            if(hws){
                hws=false;
            }
            t+=chr;
        }
    }
    if(t.length!==0){
        out.push(t);
    }
    return out;
}

function aliasmatch(un,al){
    for(var i=0;i<al.length;i++){
        if(un === al[i][0]){
            return al[i][1];
        }
    }
    return un;
}

function processcmd(s){
    var cmd = breakcmd_notag(s);
    var b;
    var i,j,k;
    var dtp;
    var oa,os,c;
    if(cmd.length === 0){
        return;
    }
    switch(cmd[0]){
        case "":
            return; 
        break;//
        case "cls":
            tty_pre = "";
        break;
        case "clr":
            tty_pre = "";
        break;
        case "clear":
            tty_pre = "";
        break;
        case "mgr":
            if(cmd.length === 1){
                cout("[mgr] No input specified.\n");
                return;
            }
            switch(cmd[1]){
                case "list":
                    if(cmd.length === 2){
                        cout("[mgr] List options: raw room user name\n");
                        return;
                    }
                    dtp = tsvstr_to_2darr(gres)[0][0].split("\u0000");
                    var grep = ["",0]; //[cmd1check (-1 means any),cmdret (-1 means line)]
                    switch(cmd[2]){
                        case "room":
                            grep = ["post",2];
                        break;
                        case "user":
                            grep = [-1,0];
                        break;
                        case "name":
                            grep = ["name",-1];
                        break;
                        case "raw":
                            cout(dtp.join("\n")+"\n");
                            return;
                        default:
                            cout("[mgr] "+cmd[2]+" not recognized as list.\n");
                            return;
                    }
                    oa = [];
                    for(i=0;i<dtp.length;i++){
                        b = breakcmd(dtp[i]);
                        if(b.length < 2){
                            continue; //just doesn't count.
                        }
                        if(grep[0] === -1 || b[1] === grep[0]){
                            k = true;
                            for(j=0;j<oa.length;j++){
                                if(grep[1] === -1){
                                    //k=false;
                                    break;
                                }else if(oa[j] === b[grep[1]]){
                                    k=false;
                                    break;
                                }
                            }
                            if(k){
                                if(grep[1] === -1){
                                    oa.push(dtp[i]);
                                }else{
                                    oa.push(b[grep[1]]);
                                }
                            }
                        }
                    }
                    cout(oa.join("\n")+"\n");

                    return;
                break;
            }
        break;
        case "help":
            if(cmd.length === 1){return;}
            switch(cmd[1]){
                case "more":
                    cout("help [command]: get specific help message for command\nhelp more: display long help message\ncls / clr / clear: clear console output\nhidetext: display string used by hide (called hidetxt)\nhidetext [string]: set hidetxt string (JSON-formatted string)\nmgr: management tool\nhidestring: display string (called hidechar, defaults to newline delimiter) that hide waits for to be typed in order to close\nhidestring [string]: set hidechar string (JSON-formatted string)\n");
                    return;
                break;
            }
        break;
        case "hidetext":
            if(cmd.length === 1){
                cout("Current hide text:\n"+hidetxt+"\n");
            }else{
                hidetxt = JSON.parse(cmd[1]);
            }
        break;
        case "hidestring":
            if(cmd.length === 1){
                cout("Current hide string: "+JSON.stringify(hidechar)+"\n");
            }else{
                hidechar = JSON.parse(cmd[1]);
            }
        break;
        case "cache":
            //save client settings for user
            cache_cli_settings_w_srv();
        break;
        case "decache":
            //unsave client settings for user
            decache_cli_settings_w_srv();
        break;
        case "tickrate":
            if(cmd.length!==2){
                cout("Insufficient arguments.\n");
                return;
            }
            tr = JSON.parse(cmd[1]);
        break;
        case "apply-cache":
            cacheinit();
            applyCacheStore();
        break;
        case "eval":
            for(i=1;i<cmd.length;i++){
                try{eval(JSON.parse(cmd[i]));}catch(error){cout("From eval: "+error.message+"\n");}
            }
        break;
        case "evalecho":
            for(i=1;i<cmd.length;i++){
                try{cout(""+eval(JSON.parse(cmd[i]))+"\n");}catch(error){cout("From evalecho: "+error.message+"\n");}
            }
        break;
        default:
            cout("'"+cmd[0]+"' is not recognized as a valid command.\n");
    }
}

function applyCacheStore(){
    if(gCacheString.length === 0){
        return;
    }
    var c = JSON.parse(gCacheString);
    hidechar = c.hidechar;
    hidetxt = c.hidetxt;
    tr = c.tr;
    room = c.room;
    scr = c.scr;
    notif = c.notif;
    //cout("[cache] belli changed from "+belli+" to "+c.belli+".\n");//debug
    belli = c.belli;
    keyw = c.keyw;
    autoexec = c.autoexec;
    switch(c.cacheversion){
        case cacheversion:
            showposttimestamp = c.showposttimestamp;
        break;
        default:
            needstocache = true;
    }
    rmchange=true;
    cout("Cached settings applied.\n");
    eval(autoexec);
}

function cacheinit(){
    //workinonit
    var out = "";
    var dtp = tsvstr_to_2darr(gres)[0][0].split("\u0000");
    //console.log(dtp);

    //var al = []; //[un,name]
    //var posts = []; //[un,str,i]
    //var del = []; //[un,post(i)]
    var i,j;
    for(i=0;i<dtp.length;i++){
        //un:post #room str
        //un:name str
        var cmd = breakcmd(dtp[i]);
        if(cmd.length < 2){
            continue;
        }else if(cmd[0] === username && cmd[1] === "cache"){
            if(cmd.length!==3){continue;}
            gCacheString = JSON.parse(cmd[2]);
        }else if(cmd[0] === username && cmd[1] === "decache"){
            gCacheString = "";
        }
    }
}

function flushkeybuffer(){
    var out = "";
    if(mobilekeybuffer.length!==0){
        keybuffer = keybuffer.concat(mobilekeybuffer);
        mobilekeybuffer = [];
    }
    for(var i=0;i<keybuffer.length;i++){
        if(keybuffer[i] === "Enter" && notif && belli !== curgresi){ //wow.
            //cout("belli changed from "+belli+" to "+curgresi+".\n");//debug
            belli = curgresi;
            rmchange=true;//feedcache = getfeed(room);
        }
        out+=dispchar(keybuffer[i]);
    }
    keybuffer = [];
    skb=0;
    return out;
}

function backspace(){
    keybs = keybs.slice(0,keybs.length-1);
}

function histscroll(ch){
    histi = Math.max(0,Math.min(keybshistory.length-1,histi+ch));
    keybs = keybshistory[histi];
}

function commitkeybshist(s){
    keybshistory[keybshistory.length-1] = s;
    histi = keybshistory.length;
    keybshistory.push("");
}

function dispchar(str){
    //alert(str);
    if(str.length === 1){
        return str;
    }else if(str === "Enter"){
        return "\n";
    }else if(str === "Backspace"){
        backspace();
        return "";
    }else if(str === "Shift"){
        //you ain't got no job-- and you ain't got sh*t to do! 
        return "";
    }else if(str === "Meta"){
        return ""; //not sure what I want to do yet
    }else if(str === "Control"){
        return ""; //not sure what I want to do yet
    }else if(str === "ArrowUp"){
        if(override_histcommit){
            yduch++;
        }else{histscroll(-1);}
        return "";
    }else if(str === "ArrowDown"){
        if(override_histcommit){
            yduch--;
        }else{histscroll(1);}
        return "";
    }else if(str === "ArrowLeft"){
        xlrch--;
        return "";
    }else if(str === "ArrowRight"){
        xlrch++;
        return "";
    }else{
        return str;//debug
    }
}
